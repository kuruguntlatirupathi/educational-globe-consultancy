<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#003366,#0059b3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:#003366;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#ff6600;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ff3300;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#003366;
}

</style>

</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<p>Enter your email to reset your password</p>

<form>

<input type="email" placeholder="Enter your email" required>

<button type="submit">Send Reset Link</button>

</form>

<a href="login.html">Back to Login</a>

</div>

</body>
</html>
